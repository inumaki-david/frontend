<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <title>EventMaster - Gestão de Convidados</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Credenciamento EventMaster</h1>
    <button id="btnDark">Modo Escuro</button>
    <br>
        <form id="formulario">
            <input type="text" id="nome" placeholder="Nome Completo">
            <input type="email" id="email" placeholder="E-mail">
            <input type="text" id="empresa" placeholder="Empresa">
            <input type="text" id="cargo" placeholder="Cargo">
            <input type="tel" id="telefone" placeholder="Telefone">
            <button type="submit">Confirmar Presença</button>
            <p id="msgErro" style="color: red; display: none;">Por favor, preencha todos os campos!</p>
        </form>
        <br>
        <section>
            <h2>Lista de Confirmados</h2>
            <ul id="listaConvidados"></ul>
        </section>
    <script src="script.js"></script>
</body>
</html>
